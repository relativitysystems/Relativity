<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="shortcut icon" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <title>Client Login — Relativity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portal.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-logo"><img src="relativity_white.png" alt="Relativity" class="logo-img"></a>
    <span class="nav-label">Client Portal</span>
  </nav>

  <main class="main login-main">
    <div class="login-card">
      <h1 class="login-title">Sign In</h1>
      <p class="login-sub">Access your operations hub.</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>

        <div id="loginError" class="login-error" hidden></div>

        <button type="submit" id="loginBtn" class="btn-login">Sign In</button>
      </form>
    </div>
  </main>

  <footer class="footer">
    <span>&copy; 2026 Relativity Systems</span>
    <a href="index.html">Back to site</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="login.js"></script>
</body>
</html>
