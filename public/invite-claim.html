<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="shortcut icon" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <title>Set Up Your Account — Relativity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portal.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-logo"><img src="relativity_white.png" alt="Relativity" class="logo-img"></a>
    <span class="nav-label">Client Portal</span>
  </nav>

  <main class="main login-main">
    <div class="login-card">

      <!-- Loading while Supabase processes the invite link -->
      <div id="loadingState">
        <h1 class="login-title">Setting up your account…</h1>
        <p class="login-sub">Please wait a moment.</p>
      </div>

      <!-- Shown when the invite link is invalid or expired -->
      <div id="invalidState" hidden>
        <h1 class="login-title">Link Expired</h1>
        <p class="login-sub">This invite link is invalid or has already been used. Contact your account manager for a new invite.</p>
      </div>

      <!-- Password set form -->
      <div id="formContainer" hidden>
        <h1 class="login-title">Welcome to Relativity</h1>
        <p class="login-sub">Set a password to activate your account.</p>

        <form id="setPasswordForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input
              type="password"
              id="password"
              class="form-input"
              placeholder="At least 8 characters"
              required
              autocomplete="new-password"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="confirmPassword">Confirm Password</label>
            <input
              type="password"
              id="confirmPassword"
              class="form-input"
              placeholder="••••••••"
              required
              autocomplete="new-password"
            />
          </div>

          <div id="inviteError" class="login-error" hidden></div>

          <button type="submit" id="setPasswordBtn" class="btn-login">Create Account</button>
        </form>
      </div>

    </div>
  </main>

  <footer class="footer">
    <span>&copy; 2025 Relativity Systems</span>
    <a href="index.html">Back to site</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="invite-claim.js"></script>
</body>
</html>
